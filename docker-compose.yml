version: '3.8'

services:
  espn-plus:
    build:
      context: .
      dockerfile: docker/nodejs.Dockerfile
    ports:
      - "8080:8000"
    volumes:
      - ./config:/app/config
    environment:
      - NODE_ENV=development
    command: npm start
    restart: always
    depends_on:
      - php-proxy

  go-stream:
    build:
      context: .
      dockerfile: docker/go.Dockerfile
    ports:
      - "8182:3000"
    restart: always
  php-proxy:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
    ports:
      - "8283:3000"
    environment:
      - PROXY_URL=
    restart: always
